name: Site bug
description: Report a problem with the generated documentation site.
title: "[Site]: "
labels:
  - bug
  - documentation
body:
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: https://arcessahq.github.io/docs/
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the rendering, navigation, search, metadata, or workflow issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser or client
      placeholder: Chrome, Safari, Firefox, crawler, AI agent, curl
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, console output, or response headers. Do not include secrets.
