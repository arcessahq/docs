[project]
site_name = "Arcessa Docs"
site_description = "Usage, operations, and integration documentation for Arcessa, the control plane for MCP tools and A2A agents."
site_author = "Arcessa"
site_url = "https://arcessahq.github.io/docs/"
copyright = "Copyright &copy; 2026 Arcessa"
extra_css = ["stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Get started" = [
    { "What is Arcessa?" = "get-started/what-is-arcessa.md" },
    { "Quickstart" = "get-started/quickstart.md" },
    { "First product tour" = "get-started/first-tour.md" },
    { "Local development" = "get-started/local-dev.md" },
  ] },
  { "Concepts" = [
    { "Capability map" = "concepts/capability-map.md" },
    { "Architecture" = "concepts/architecture.md" },
    { "Request lifecycle" = "concepts/request-lifecycle.md" },
    { "Auth model" = "concepts/auth.md" },
  ] },
  { "Developer console" = [
    { "Test tools and agents" = "console/developer-console.md" },
  ] },
  { "MCP" = [
    { "Connect clients" = "mcp/connect-clients.md" },
    { "Register tools" = "mcp/register-tools.md" },
    { "Transports" = "mcp/transports.md" },
  ] },
  { "A2A" = [
    { "Agent gateway" = "a2a/agent-gateway.md" },
  ] },
  { "Identity" = [
    { "OAuth and tokens" = "identity/oauth.md" },
    { "SSO and SCIM" = "identity/sso-scim.md" },
  ] },
  { "Governance" = [
    { "Policies and approvals" = "governance/policies.md" },
    { "Guardrails and budgets" = "governance/guardrails.md" },
  ] },
  { "Observability" = [
    { "Audit, usage, and SIEM" = "observability/audit-usage-siem.md" },
  ] },
  { "Security" = [
    { "Production hardening" = "security/production-hardening.md" },
  ] },
  { "Deploy" = [
    { "Docker and real stack" = "deploy/docker.md" },
  ] },
  { "Testing" = [
    { "Overview" = "testing/overview.md" },
  ] },
  { "Reference" = [
    { "API examples" = "reference/api.md" },
    { "Configuration" = "reference/configuration.md" },
  ] },
  { "Troubleshooting" = [
    { "Common issues" = "troubleshooting/common-issues.md" },
  ] },
]

[project.theme]
variant = "classic"
language = "en"
custom_dir = "overrides"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.icon]
logo = "lucide/shield-check"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/arcessahq/docs"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
